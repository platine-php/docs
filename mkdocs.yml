# Project information
site_name: 'Platine Framework Docs'
site_description: 'Platine Framework Documentation'
site_author: 'Platine Team'
site_url: 'https://github.com/platine-php/docs'
use_directory_urls: false
edit_uri: ''

#Pages
nav:
